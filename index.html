<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PadelMatch 🎾</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="margin:0;padding:0;background:#0f172a">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { createClient } = supabase;
    const sb = createClient("https://gzrcfmqvtvyomxsfccas.supabase.co","sb_publishable_DMRCDtG0oRnuSfA8CNoG7A_XE7irmWo");
    const LEVELS = ["Beginner","Gevorderd beginner","Intermediate","Gevorderd","Expert"];
    const REGIONS = ["Breda","Tilburg","Rotterdam","Amsterdam","Utrecht","Eindhoven"];
    const lc = l => ({"Beginner":"#22c55e","Gevorderd beginner":"#84cc16","Intermediate":"#eab308","Gevorderd":"#f97316","Expert":"#ef4444"}[l]||"#6b7280");
    const fd = d => new Date(d).toLocaleDateString("nl-NL",{weekday:"short",day:"numeric",month:"short"});
    const inp = {width:"100%",background:"#1e293b",color:"#f1f5f9",border:"1px solid #334155",borderRadius:12,padding:"12px 14px",fontSize:15,boxSizing:"border-box",colorScheme:"dark"};
    const lbl = {fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:6,display:"block"};

    function Card({s,parts,uid,onJoin,onLeave,compact}){
      const joined=parts.some(p=>p.user_id===uid);
      const left=s.spots-parts.length;
      const full=left<=0;
      return <div style={{background:"#1e293b",borderRadius:16,padding:18,marginBottom:12,border:`1px solid ${joined?"#1d4ed8":"#334155"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <div><div style={{fontWeight:700,fontSize:15}}>{s.location}</div><div style={{fontSize:13,color:"#64748b"}}>{s.region} · {s.creator_name}</div></div>
          <span style={{background:lc(s.level)+"22",color:lc(s.level),borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700}}>{s.level}</span>
        </div>
        <div style={{display:"flex",gap:16,marginBottom:14}}>
          <span style={{fontSize:13,color:"#94a3b8"}}>📅 {fd(s.date)}</span>
          <span style={{fontSize:13,color:"#94a3b8"}}>🕐 {s.time?.slice(0,5)}</span>
        </div>
        {!compact&&<div style={{marginBottom:14}}>
          <div style={{fontSize:12,color:"#64748b",marginBottom:6}}>Spelers ({parts.length}/{s.spots})</div>
          <div style={{display:"flex",gap:6}}>{Array.from({length:s.spots}).map((_,i)=><div key={i} style={{width:32,height:32,borderRadius:"50%",background:i<parts.length?"linear-gradient(135deg,#2563eb,#7c3aed)":"#334155",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff"}}>{i<parts.length?parts[i].name[0]:""}</div>)}</div>
        </div>}
        <button onClick={()=>joined?onLeave(s.id):onJoin(s.id)} disabled={full&&!joined} style={{width:"100%",border:"none",borderRadius:12,padding:11,fontWeight:700,fontSize:14,cursor:full&&!joined?"default":"pointer",background:joined?"#166534":full?"#374151":"#2563eb",color:joined?"#86efac":full?"#9ca3af":"#fff"}}>
          {joined?"✓ Aangemeld — tik om af te melden":full?"Sessie vol":`Aanmelden (${left} plek${left!==1?"ken":""} vrij)`}
        </button>
      </div>;
    }

    function App(){
      const [screen,setScreen]=useState("home");
      const [user,setUser]=useState(null);
      const [profile,setProfile]=useState(null);
      const [sessions,setSessions]=useState([]);
      const [parts,setParts]=useState({});
      const [fr,setFr]=useState("Breda");
      const [fl,setFl]=useState("Alle niveaus");
      const [toast,setToast]=useState(null);
      const [loading,setLoading]=useState(true);
      const [am,setAm]=useState("login");
      const [af,setAf]=useState({email:"",password:"",name:"",region:"Breda",level:"Intermediate"});
      const [ns,setNs]=useState({region:"Breda",level:"Intermediate",date:"",time:"",location:"",spots:"4"});
      const [al,setAl]=useState(false);

      const toast2=(msg,err=false)=>{setToast({msg,err});setTimeout(()=>setToast(null),3000);};

      useEffect(()=>{
        sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);if(session?.user)fp(session.user.id);setLoading(false);});
        const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setUser(session?.user??null);if(session?.user)fp(session.user.id);});
        return()=>subscription.unsubscribe();
      },[]);
      useEffect(()=>{fs();},[]);

      const fp=async uid=>{const{data}=await sb.from("profiles").select("*").eq("id",uid).single();if(data)setProfile(data);};
      const fs=async()=>{const{data}=await sb.from("sessions").select("*").order("date",{ascending:true});if(data){setSessions(data);fap(data.map(s=>s.id));}};
      const fap=async ids=>{if(!ids.length)return;const{data}=await sb.from("participants").select("*").in("session_id",ids);if(data){const m={};data.forEach(p=>{if(!m[p.session_id])m[p.session_id]=[];m[p.session_id].push(p);});setParts(m);}};

      const reg=async()=>{if(!af.name||!af.email||!af.password)return toast2("Vul alle velden in",true);setAl(true);const{data,error}=await sb.auth.signUp({email:af.email,password:af.password});if(error){toast2(error.message,true);setAl(false);return;}if(data.user){await sb.from("profiles").insert({id:data.user.id,name:af.name,region:af.region,level:af.level});await fp(data.user.id);toast2("Welkom bij PadelMatch! 🎾");setScreen("home");}setAl(false);};
      const login=async()=>{if(!af.email||!af.password)return toast2("Vul alle velden in",true);setAl(true);const{error}=await sb.auth.signInWithPassword({email:af.email,password:af.password});if(error){toast2("Onjuist e-mail of wachtwoord",true);setAl(false);return;}toast2("Welkom terug! 🎾");setScreen("home");setAl(false);};
      const logout=async()=>{await sb.auth.signOut();setProfile(null);setScreen("home");toast2("Tot de volgende keer!");};
      const join=async id=>{if(!user)return toast2("Log in om mee te doen",true);const{error}=await sb.from("participants").insert({session_id:id,user_id:user.id,name:profile?.name||"Speler"});if(error)return toast2("Aanmelden mislukt",true);await fap(sessions.map(s=>s.id));toast2("Je bent aangemeld! 🎾");};
      const leave=async id=>{await sb.from("participants").delete().eq("session_id",id).eq("user_id",user.id);await fap(sessions.map(s=>s.id));toast2("Je bent afgemeld");};
      const create=async()=>{if(!user)return toast2("Log in",true);if(!ns.date||!ns.time||!ns.location)return toast2("Vul alle velden in",true);const{error}=await sb.from("sessions").insert({creator_id:user.id,creator_name:profile?.name||"Speler",...ns,spots:parseInt(ns.spots)});if(error)return toast2("Mislukt",true);await fs();setNs({region:"Breda",level:"Intermediate",date:"",time:"",location:"",spots:"4"});setScreen("sessions");toast2("Sessie aangemaakt! 🎾");};

      const filtered=sessions.filter(s=>(fr==="Alle regio's"||s.region===fr)&&(fl==="Alle niveaus"||s.level===fl));
      const mySessions=sessions.filter(s=>(parts[s.id]||[]).some(p=>p.user_id===user?.id));
      const nav=[{id:"home",icon:"⚡",label:"Home"},{id:"sessions",icon:"🎾",label:"Sessies"},{id:"create",icon:"＋",label:"Aanmaken"},{id:"profile",icon:"👤",label:"Profiel"}];

      if(loading)return <div style={{background:"#0f172a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18}}>🎾 Laden...</div>;

      return <div style={{fontFamily:"system-ui,sans-serif",background:"#0f172a",minHeight:"100vh",color:"#f1f5f9",maxWidth:430,margin:"0 auto",paddingBottom:80}}>
        {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toast.err?"#ef4444":"#22c55e",color:"#fff",borderRadius:12,padding:"10px 20px",fontWeight:600,fontSize:14,zIndex:999}}>{toast.msg}</div>}
        <div style={{background:"linear-gradient(135deg,#1e3a5f,#0f172a)",padding:"50px 20px 20px",borderBottom:"1px solid #1e293b"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:28}}>🎾</span><div><div style={{fontSize:22,fontWeight:800}}>PadelMatch</div><div style={{fontSize:12,color:"#64748b"}}>Vind je spelpartners</div></div></div>
            {!user?<button onClick={()=>setScreen("auth")} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontWeight:600,fontSize:13,cursor:"pointer"}}>Inloggen</button>:<div style={{fontSize:13,color:"#94a3b8"}}>👋 {profile?.name}</div>}
          </div>
        </div>
        <div style={{padding:"20px 16px"}}>
          {screen==="auth"&&<div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>{am==="login"?"Inloggen":"Account aanmaken"}</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:24}}>{am==="login"?"Welkom terug!":"Maak een gratis account aan"}</div>
            {am==="register"&&<><label style={lbl}>Naam</label><input style={{...inp,marginBottom:16}} placeholder="Jouw naam" value={af.name} onChange={e=>setAf(p=>({...p,name:e.target.value}))}/><label style={lbl}>Regio</label><select style={{...inp,marginBottom:16}} value={af.region} onChange={e=>setAf(p=>({...p,region:e.target.value}))}>{REGIONS.map(r=><option key={r}>{r}</option>)}</select><label style={lbl}>Niveau</label><select style={{...inp,marginBottom:16}} value={af.level} onChange={e=>setAf(p=>({...p,level:e.target.value}))}>{LEVELS.map(l=><option key={l}>{l}</option>)}</select></>}
            <label style={lbl}>E-mail</label><input style={{...inp,marginBottom:16}} type="email" placeholder="jouw@email.nl" value={af.email} onChange={e=>setAf(p=>({...p,email:e.target.value}))}/>
            <label style={lbl}>Wachtwoord</label><input style={{...inp,marginBottom:16}} type="password" placeholder="Minimaal 6 tekens" value={af.password} onChange={e=>setAf(p=>({...p,password:e.target.value}))}/>
            <button onClick={am==="login"?login:reg} disabled={al} style={{width:"100%",background:"#2563eb",color:"#fff",border:"none",borderRadius:14,padding:16,fontWeight:700,fontSize:16,cursor:"pointer"}}>{al?"Even geduld...":am==="login"?"Inloggen":"Account aanmaken"}</button>
            <div style={{textAlign:"center",marginTop:16,fontSize:14,color:"#64748b"}}>{am==="login"?"Nog geen account? ":"Al een account? "}<span onClick={()=>setAm(am==="login"?"register":"login")} style={{color:"#2563eb",cursor:"pointer",fontWeight:600}}>{am==="login"?"Aanmelden":"Inloggen"}</span></div>
<div style={{textAlign:"center",marginTop:12,fontSize:14}}><span onClick={async()=>{if(!af.email)return toast2("Vul eerst je e-mailadres in",true);const{error}=await sb.auth.resetPasswordForEmail(af.email);if(error)return toast2(error.message,true);toast2("Check je e-mail voor een resetlink! 📧");}} style={{color:"#64748b",cursor:"pointer",textDecoration:"underline"}}>Wachtwoord vergeten?</span></div>

          </div>}
          {screen==="home"&&<div>
            <div style={{background:"linear-gradient(135deg,#1e3a5f,#164e63)",borderRadius:20,padding:24,marginBottom:20,border:"1px solid #1e40af"}}>
              <div style={{fontSize:13,color:"#93c5fd",fontWeight:600,marginBottom:4}}>{user?`Welkom terug, ${profile?.name} 👋`:"Welkom bij PadelMatch 👋"}</div>
              <div style={{fontSize:24,fontWeight:800,marginBottom:8}}>Klaar voor een potje?</div>
              <div style={{fontSize:14,color:"#94a3b8",marginBottom:20}}><strong style={{color:"#38bdf8"}}>{sessions.length} sessies</strong> beschikbaar</div>
              <button onClick={()=>setScreen("sessions")} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:12,padding:"12px 24px",fontWeight:700,fontSize:15,cursor:"pointer"}}>Bekijk sessies →</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
              {[{icon:"🔍",title:"Zoek sessie",sub:"Filter op niveau & regio",action:()=>setScreen("sessions")},{icon:"➕",title:"Maak sessie",sub:"Nodig anderen uit",action:()=>setScreen("create")}].map((item,i)=><div key={i} onClick={item.action} style={{background:"#1e293b",borderRadius:16,padding:18,cursor:"pointer",border:"1px solid #334155"}}><div style={{fontSize:28,marginBottom:8}}>{item.icon}</div><div style={{fontWeight:700,fontSize:15}}>{item.title}</div><div style={{fontSize:12,color:"#64748b",marginTop:4}}>{item.sub}</div></div>)}
            </div>
            {sessions.slice(0,3).map(s=><Card key={s.id} s={s} parts={parts[s.id]||[]} uid={user?.id} onJoin={join} onLeave={leave} compact/>)}
          </div>}
          {screen==="sessions"&&<div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:16}}>Sessies zoeken</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <select value={fr} onChange={e=>setFr(e.target.value)} style={{...inp,flex:1}}><option>Alle regio's</option>{REGIONS.map(r=><option key={r}>{r}</option>)}</select>
              <select value={fl} onChange={e=>setFl(e.target.value)} style={{...inp,flex:1}}><option>Alle niveaus</option>{LEVELS.map(l=><option key={l}>{l}</option>)}</select>
            </div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>{filtered.length} sessie{filtered.length!==1?"s":""} gevonden</div>
            {filtered.length===0?<div style={{textAlign:"center",padding:40,color:"#64748b"}}><div style={{fontSize:40,marginBottom:12}}>😔</div><div style={{fontWeight:600}}>Geen sessies gevonden</div></div>:filtered.map(s=><Card key={s.id} s={s} parts={parts[s.id]||[]} uid={user?.id} onJoin={join} onLeave={leave}/>)}
          </div>}
          {screen==="create"&&<div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>Sessie aanmaken</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Nodig medespelers uit</div>
            {!user?<div style={{textAlign:"center",padding:40}}><div style={{fontSize:40,marginBottom:12}}>🔒</div><div style={{fontWeight:600,marginBottom:8}}>Log in om een sessie aan te maken</div><button onClick={()=>setScreen("auth")} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:12,padding:"12px 24px",fontWeight:700,cursor:"pointer"}}>Inloggen</button></div>:
            <>{[{label:"Regio",type:"select",key:"region",options:REGIONS},{label:"Speelsterkte",type:"select",key:"level",options:LEVELS},{label:"Datum",type:"date",key:"date"},{label:"Tijd",type:"time",key:"time"},{label:"Locatie",type:"text",key:"location",placeholder:"bijv. Padelclub Breda Noord"},{label:"Aantal plekken",type:"select",key:"spots",options:["2","3","4"]}].map(f=><div key={f.key} style={{marginBottom:16}}><label style={lbl}>{f.label}</label>{f.type==="select"?<select value={ns[f.key]} onChange={e=>setNs(p=>({...p,[f.key]:e.target.value}))} style={inp}>{f.options.map(o=><option key={o}>{o}</option>)}</select>:<input type={f.type} value={ns[f.key]} placeholder={f.placeholder||""} onChange={e=>setNs(p=>({...p,[f.key]:e.target.value}))} style={inp}/>}</div>)}
            <button onClick={create} style={{width:"100%",background:"#2563eb",color:"#fff",border:"none",borderRadius:14,padding:16,fontWeight:700,fontSize:16,cursor:"pointer"}}>Sessie aanmaken 🎾</button></>}
          </div>}
          {screen==="profile"&&<div>
            {!user?<div style={{textAlign:"center",padding:60}}><div style={{fontSize:50,marginBottom:16}}>👤</div><div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Nog niet ingelogd</div><button onClick={()=>setScreen("auth")} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:12,padding:"12px 24px",fontWeight:700,cursor:"pointer"}}>Inloggen</button></div>:
            <><div style={{textAlign:"center",paddingTop:20,marginBottom:28}}>
              <div style={{width:72,height:72,borderRadius:"50%",background:"linear-gradient(135deg,#2563eb,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 12px"}}>{profile?.name?.[0]||"?"}</div>
              <div style={{fontSize:22,fontWeight:800}}>{profile?.name}</div><div style={{fontSize:13,color:"#64748b"}}>{profile?.region} · {profile?.level}</div>
            </div>
            <div style={{background:"#1e293b",borderRadius:16,padding:20,marginBottom:16,border:"1px solid #334155"}}>
              {[{label:"Sessies deelgenomen",value:mySessions.length},{label:"Regio",value:profile?.region},{label:"Niveau",value:profile?.level}].map((item,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:i<2?"1px solid #334155":"none"}}><span style={{color:"#94a3b8",fontSize:14}}>{item.label}</span><span style={{fontWeight:700,fontSize:14}}>{item.value}</span></div>)}
            </div>
            <div style={{background:"#1e293b",borderRadius:16,padding:20,marginBottom:16,border:"1px solid #334155"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#64748b",marginBottom:14,textTransform:"uppercase",letterSpacing:1}}>Mijn sessies</div>
              {mySessions.length===0?<div style={{color:"#64748b",fontSize:14}}>Nog geen sessies.</div>:mySessions.map(s=><div key={s.id} style={{padding:"10px 0",borderBottom:"1px solid #334155"}}><div style={{fontWeight:600,fontSize:14}}>{s.location}</div><div style={{fontSize:12,color:"#64748b"}}>{fd(s.date)} · {s.time?.slice(0,5)} · {s.region}</div></div>)}
            </div>
            <button onClick={logout} style={{width:"100%",background:"#ef4444",color:"#fff",border:"none",borderRadius:14,padding:16,fontWeight:700,fontSize:16,cursor:"pointer"}}>Uitloggen</button></>}
          </div>}
        </div>
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#0f172a",borderTop:"1px solid #1e293b",display:"flex",padding:"10px 0 20px"}}>
          {nav.map(item=><button key={item.id} onClick={()=>setScreen(item.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:screen===item.id?"#2563eb":"#475569"}}><span style={{fontSize:20}}>{item.icon}</span><span style={{fontSize:10,fontWeight:screen===item.id?700:500}}>{item.label}</span></button>)}
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
